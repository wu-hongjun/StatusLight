site_name: OpenSlicky
site_description: Open-source driver & tools for the Lexcelon Slicky USB status light
site_url: https://wu-hongjun.github.io/OpenSilcky/
repo_url: https://github.com/wu-hongjun/OpenSilcky
repo_name: wu-hongjun/OpenSilcky

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Slack Setup: slack-setup/index.md
  - Reference:
      - CLI: reference/cli.md
      - Daemon API: reference/daemon-api.md
      - FFI: reference/ffi.md
      - Protocol: reference/protocol.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture: development/architecture.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
