name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
            deps: brew install hidapi
          - target: aarch64-apple-darwin
            runner: macos-latest
            deps: brew install hidapi
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y libhidapi-dev libudev-dev
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: ${{ matrix.deps }}

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="openslicky-${TAG}-${{ matrix.target }}"
          mkdir -p "${STAGING}"

          # Binaries
          cp "target/${{ matrix.target }}/release/slicky"  "${STAGING}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/slickyd"  "${STAGING}/" 2>/dev/null || true

          # FFI library
          cp target/${{ matrix.target }}/release/libslicky_ffi.a    "${STAGING}/" 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libslicky_ffi.dylib "${STAGING}/" 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libslicky_ffi.so    "${STAGING}/" 2>/dev/null || true

          # C header
          cp crates/slicky-ffi/include/slicky.h "${STAGING}/" 2>/dev/null || true

          tar czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openslicky-${{ matrix.target }}
          path: openslicky-*.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: openslicky-*.tar.gz
